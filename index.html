<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مشوارك - اطلب الآن</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-color: #5d3fd3; --bg-color: #f4f7f6; --success: #22c55e; --waiting: #f59e0b; }
        body { background-color: var(--bg-color); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; padding: 20px; direction: rtl; margin: 0; }
        .container { background: white; width: 100%; max-width: 450px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--main-color); margin-top: 20px; }
        
        /* الهيدر والتبويبات */
        .header-tabs { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { border: 2px solid #eee; padding: 10px 15px; font-size: 16px; font-weight: bold; background: white; cursor: pointer; transition: 0.3s; color: #666; border-radius: 12px; flex: 1; white-space: nowrap; }
        .tab-btn.active { border-color: var(--main-color); color: var(--main-color); background-color: #f3f0ff; }

        /* الكروت والسجل */
        .history-item { border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 12px; position: relative; background: #fafafa; }
        .status-badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: bold; float: left; }
        .status-waiting { background: #fef3c7; color: #d97706; }
        .status-active { background: #dcfce7; color: #166534; }
        .status-completed { background: #f1f5f9; color: #64748b; }

        .input-group { text-align: right; margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #fafafa; font-family: inherit; }
        .btn-submit { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; background: var(--main-color); color: white; transition: 0.3s; }
        #statusDisplay { margin-top: 20px; padding: 15px; border-radius: 12px; border: 2px solid var(--success); background: #f0fdf4; display: none; }
        .user-info-bar { background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; display: flex; justify-content: space-between; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container" id="mainCont">
    <div id="loginSection">
        <h2 style="text-align:center; color:var(--main-color)">سجل رقمك للبدء</h2>
  🚨             يرجي إدخال الرقم صحيح لضمان التواصل  
        <input type="tel" id="entryPhone" placeholder="01xxxxxxxxx" maxlength="11" style="text-align:center; margin:20px 0;">
        <button class="btn-submit" onclick="saveCustomerLogin()">دخول 🚀</button>
    </div>
📢 ؛ لاتقلق الخدمه تحت اداره محترمه 🙂🌹
    <div id="appSection" style="display: none;">
        <div class="user-info-bar">
            <span><i class="fas fa-phone"></i> <b id="displayPhone"></b></span>
            <button onclick="logoutCustomer()" style="color:red; border:none; background:none; cursor:pointer;">تغيير</button>
        </div>

        <div class="header-tabs">
            <button class="tab-btn active" id="btn-mishwar" onclick="showSection('mishwar')">🛺 مشوار</button>
            <button class="tab-btn" id="btn-talab" onclick="showSection('talab')">📦 طلب</button>
            <button class="tab-btn" id="btn-history" onclick="showSection('history')">📋 طلباتي</button>
        </div>

        <div id="section-mishwar" class="content-section active">
            <form id="formMishwar">
                <div class="input-group"><label>مكانك / منزلك📍</label><input type="text" id="startLocation" required></div>
                <div class="input-group"><label>رايح فين؟</label><select id="region" onchange="updatePrice()"></select></div>
                <div id="priceDisplay" style="text-align:center; font-weight:bold; margin-bottom:10px; color:var(--main-color)"></div>
                <button type="submit" class="btn-submit">تأكيد المشوار ✅</button>
            </form>
        </div>

        <div id="section-talab" class="content-section" style="display:none">
            <form id="formTalab">
                <div class="input-group"><label>عنوان منزلك🏠</label><input type="text" id="userAddress" required></div>
                <div class="input-group"><label>طلبك🛍️</label><textarea id="userOrder" rows="3" required></textarea></div>
                <button type="submit" class="btn-submit">إرسال الطلب 📦</button>
            </form>
        </div>

        <div id="section-history" class="content-section" style="display:none">
            <h3 style="margin-bottom:15px; font-size:16px;">سجل طلباتك الأخيرة:</h3>
            <div id="historyList">جاري تحميل طلباتك...</div>
        </div>

        <div id="statusDisplay"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsnynZvTRwXZyfcltKhagFW-tJM9zjuY8",
        authDomain: "zezo-44313.firebaseapp.com",
        projectId: "zezo-44313",
        databaseURL: "https://zezo-44313-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let userPhone = "";

    window.onload = function() {
        const saved = localStorage.getItem('customerPhone');
        if (saved) { userPhone = saved; showApp(); }
    };

    function saveCustomerLogin() {
        const phone = document.getElementById('entryPhone').value;
        if (phone.length < 11) { alert("رقم خطأ"); return; }
        localStorage.setItem('customerPhone', phone);
        userPhone = phone;
        showApp();
    }

    function showApp() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('appSection').style.display = 'block';
        document.getElementById('displayPhone').innerText = userPhone;
        loadRegions();
        loadHistory(); // تحميل السجل
    }

    function showSection(name) {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('section-' + name).style.display = 'block';
        document.getElementById('btn-' + name).classList.add('active');
    }

    function loadRegions() {
        db.ref('pricing').on('value', snap => {
            const sel = document.getElementById('region');
            sel.innerHTML = '<option value="">اختر الوجهة...</option>';
            snap.forEach(c => { sel.innerHTML += `<option value="${c.val().price}">${c.val().name}</option>`; });
        });
    }

    function updatePrice() {
        const p = document.getElementById('region').value;
        document.getElementById('priceDisplay').innerText = p ? `السعر: ${p} ج` : "";
    }

    // إرسال الطلبات
    document.getElementById('formMishwar').onsubmit = (e) => {
        e.preventDefault();
        db.ref('orders').push({
            serviceType: "مشوار", customerPhone: userPhone,
            from: document.getElementById('startLocation').value,
            to: document.getElementById('region').options[document.getElementById('region').selectedIndex].text,
            price: document.getElementById('region').value,
            status: "waiting", timestamp: Date.now()
        });
        alert("تم الطلب!"); e.target.reset();
    };

    // تحميل السجل
    function loadHistory() {
        db.ref('orders').orderByChild('customerPhone').equalTo(userPhone).on('value', snap => {
            const list = document.getElementById('historyList');
            let html = '';
            let orders = [];
            snap.forEach(child => { orders.unshift({...child.val(), id: child.key}); });

            if (orders.length === 0) {
                list.innerHTML = "لا توجد طلبات سابقة.";
                return;
            }

            orders.forEach(o => {
                let statusTxt = o.status === 'waiting' ? 'في الانتظار' : (o.status === 'active' ? 'جاري التوصيل' : 'مكتمل');
                let statusClass = o.status === 'waiting' ? 'status-waiting' : (o.status === 'active' ? 'status-active' : 'status-completed');
                
                html += `
                    <div class="history-item">
                        <span class="status-badge ${statusClass}">${statusTxt}</span>
                        <div style="font-weight:bold; margin-bottom:5px;">${o.serviceType}</div>
                        <div style="font-size:12px; color:#666;">إلى: ${o.to || o.packageDescription}</div>
                        ${o.driverName ? `<div style="font-size:12px; color:var(--main-color); margin-top:5px;">الكابتن: ${o.driverName}</div>` : ''}
                    </div>
                `;
            });
            list.innerHTML = html;
        });
    }

    function logoutCustomer() { localStorage.removeItem('customerPhone'); location.reload(); }
</script>
<script>    function loadHistory() {
        db.ref('orders').orderByChild('customerPhone').equalTo(userPhone).on('value', snap => {
            const list = document.getElementById('historyList');
            let html = '';
            let orders = [];
            
            // ترتيب الطلبات من الأحدث للأقدم
            snap.forEach(child => { 
                orders.unshift({...child.val(), id: child.key}); 
            });

            if (orders.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">لا توجد طلبات سابقة</div>';
                return;
            }

            orders.forEach(o => {
                let statusTxt = o.status === 'waiting' ? 'في الانتظار' : (o.status === 'active' ? 'جاري التوصيل' : 'مكتمل');
                let statusClass = o.status === 'waiting' ? 'status-waiting' : (o.status === 'active' ? 'status-active' : 'status-completed');
                
                html += `
                    <div class="history-item" style="border-right: 5px solid ${o.status === 'active' ? 'var(--success)' : '#ddd'};">
                        <span class="status-badge ${statusClass}">${statusTxt}</span>
                        <div style="font-weight:bold; margin-bottom:5px;">${o.serviceType}</div>
                        <div style="font-size:12px; color:#666;"><b>إلى:</b> ${o.to || o.packageDescription}</div>
                        
                        ${o.status === 'active' && o.driverPhone ? `
                            <div style="margin-top:10px; padding-top:10px; border-top:1px solid #eee;">
                                <div style="font-size:13px; color:var(--main-color); margin-bottom:8px;">
                                    <i class="fas fa-user-tie"></i> الكابتن: <b>${o.driverName}</b>
                                </div>
                                <a href="tel:${o.driverPhone}" style="display:inline-flex; align-items:center; gap:8px; background:var(--main-color); color:white; padding:8px 15px; border-radius:8px; text-decoration:none; font-size:13px; font-weight:bold;">
                                   <i class="fas fa-phone-alt"></i> اتصال بالكابتن: ${o.driverPhone}
                                </a>
                            </div>
                        ` : ''}
                        
                        ${o.status === 'completed' ? `<div style="font-size:11px; color:#999; margin-top:5px;">تمت الرحلة بنجاح ✅</div>` : ''}
                    </div>
                `;
            });
            list.innerHTML = html;
        });
    }
</script>
<script>// مراقبة حالة الطلبات الخاصة بالعميل ده بس
db.ref('orders').on('child_changed', snap => {
    const order = snap.val();
    
    // التأكد إن الطلب يخص العميل الحالي وإن الكابتن وافق عليه (active)
    if (order.customerPhone === userPhone && order.status === 'active') {
        
        // 1. تشغيل صوت تنبيه (اختياري)
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        audio.play().catch(() => {}); 

        // 2. إظهار رسالة تنبيه واضحة (شعر/إشعار)
        const statusDiv = document.getElementById('statusDisplay');
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = `
            <div style="background: #dcfce7; border: 2px solid #22c55e; padding: 15px; border-radius: 15px; animation: bounce 0.5s;">
                <h3 style="color: #166534; margin-bottom: 10px;">🎉 بشرى سارة!</h3>
                <p style="margin-bottom: 10px;">الكابتن <b>${order.driverName}</b> وافق على طلبك وهو في الطريق إليك.</p>
                <a href="tel:${order.driverPhone}" style="display:block; background:#22c55e; color:white; text-align:center; padding:12px; border-radius:10px; text-decoration:none; font-weight:bold;">
                    <i class="fas fa-phone-alt"></i> اطلب الكابتن: ${order.driverPhone}
                </a>
            </div>
        `;

        // 3. تنبيه الـ Browser نفسه لو العميل مش فاتح التاب
        if (Notification.permission === "granted") {
            new Notification("مشوارك وصل!", {
                body: `الكابتن ${order.driverName} وافق على طلبك.`
            });
        }
    }
});
</script>

<script>    function loadHistory() {
        db.ref('orders').orderByChild('customerPhone').equalTo(userPhone).on('value', snap => {
            const list = document.getElementById('historyList');
            let html = '';
            let orders = [];
            snap.forEach(child => { orders.unshift({...child.val(), id: child.key}); });

            if (orders.length === 0) {
                list.innerHTML = "لا توجد طلبات سابقة.";
                return;
            }

            orders.forEach(o => {
                let statusTxt = o.status === 'waiting' ? 'في الانتظار' : (o.status === 'active' ? 'جاري التوصيل' : 'مكتمل');
                let statusClass = o.status === 'waiting' ? 'status-waiting' : (o.status === 'active' ? 'status-active' : 'status-completed');
                
                html += `
                    <div class="history-item" id="order-${o.id}">
                        <span class="status-badge ${statusClass}">${statusTxt}</span>
                        <div style="font-weight:bold; margin-bottom:5px;">${o.serviceType}</div>
                        <div style="font-size:12px; color:#666;">إلى: ${o.to || o.packageDescription}</div>
                        
                        ${o.status === 'waiting' ? `
                            <button onclick="cancelOrder('${o.id}')" style="margin-top:10px; background:#fee2e2; color:#b91c1c; border:1px solid #f87171; padding:5px 10px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:bold;">
                                <i class="fas fa-times"></i> إلغاء الطلب
                            </button>
                        ` : ''}

                        ${o.status === 'active' ? `
                            <div style="margin-top:10px; padding-top:10px; border-top:1px solid #eee;">
                                <div style="font-size:13px; color:var(--main-color); margin-bottom:8px;">الكابتن: ${o.driverName}</div>
                                <a href="tel:${o.driverPhone}" style="display:inline-block; background:var(--main-color); color:white; padding:8px 12px; border-radius:8px; text-decoration:none; font-size:12px;">اتصال بالكابتن</a>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            list.innerHTML = html;
        });
    }

    // دالة حذف الطلب من قاعدة البيانات
    function cancelOrder(orderId) {
        if (confirm("هل أنت متأكد من إلغاء هذا الطلب؟")) {
            db.ref('orders').child(orderId).remove()
            .then(() => {
                alert("تم إلغاء الطلب بنجاح.");
            })
            .catch((error) => {
                alert("حدث خطأ أثناء الإلغاء: " + error.message);
            });
        }
    }
</script>

</body>
</html>
